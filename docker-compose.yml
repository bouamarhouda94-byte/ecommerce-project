version: '3.8'

services:
  # 1. حاوية الـ PHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_app
    volumes:
      - .:/var/www/html
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/mon_projet_db?serverVersion=8.0.32&charset=utf8mb4
    networks:
      - symfony_network
    depends_on:
      - db

  # 2. مخدم الويب Nginx
  web:
    image: nginx:alpine
    container_name: symfony_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - symfony_network
    depends_on:
      - app

  # 3. قاعدة البيانات MySQL (بورت خارجي جديد 3309)
  db:
    image: mysql:8.0
    container_name: symfony_db
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mon_projet_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - symfony_network

  # 4. حاوية phpMyAdmin (بورت خارجي جديد 8090)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: symfony_phpmyadmin
    ports:
      - "8090:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root
    networks:
      - symfony_network
    depends_on:
      - db

networks:
  symfony_network:
    driver: bridge

volumes:
  db_data: